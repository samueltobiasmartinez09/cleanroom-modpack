name: Check Cleanroom Update

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get current Cleanroom version
        id: current
        run: |
          version=$(cat cleanroom-version.txt)
          echo "version=$version" | tee -a $GITHUB_OUTPUT

      - name: Fetch latest Cleanroom release
        id: latest
        run: |
          json=$(curl -sL https://api.github.com/repos/CleanroomMC/Cleanroom/releases/latest)
          tag=$(echo "$json" | grep '"tag_name"' | cut -d'"' -f4)
          echo "tag=$tag" | tee -a $GITHUB_OUTPUT

      - name: Update mmc-pack.json
        if: steps.latest.outputs.tag != '' && steps.latest.outputs.tag != steps.current.outputs.version
        run: |
          NEW_VER="${{ steps.latest.outputs.tag }}"
          echo "Updating Cleanroom: ${{ steps.current.outputs.version }} → $NEW_VER"

          # Download new mmc-pack.json
          curl -sL -o /tmp/cleanroom.zip \
            "https://github.com/CleanroomMC/Cleanroom/releases/download/$NEW_VER/Cleanroom-MMC-instance-$NEW_VER.zip"
          unzip -o /tmp/cleanroom.zip mmc-pack.json -d /tmp/
          cp /tmp/mmc-pack.json mmc-pack.json

          # Patch version to Forge's latest to suppress false update notification
          sed -i 's/"cachedVersion": "[^"]*"/"cachedVersion": "14.23.5.2860"/' mmc-pack.json
          sed -i 's/"version": "[^"]*"/"version": "14.23.5.2860"/' mmc-pack.json

          # Update packwiz hash
          HASH=$(sha256sum mmc-pack.json | cut -d' ' -f1)
          sed -i "s/hash = \".*\"/hash = \"$HASH\"/" mmc-pack.json.pw.toml

          # Store new Cleanroom version
          echo "$NEW_VER" > cleanroom-version.txt

          # Commit changes (no zip builds — only repo files)
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add mmc-pack.json mmc-pack.json.pw.toml cleanroom-version.txt
          git commit -m "Update Cleanroom to $NEW_VER"
          git push
