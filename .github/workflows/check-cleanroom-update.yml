name: Check Cleanroom Update

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get current Cleanroom version
        id: current
        run: |
          version=$(cat cleanroom-version.txt)
          echo "version=$version" | tee -a $GITHUB_OUTPUT

      - name: Fetch latest Cleanroom release
        id: latest
        run: |
          json=$(curl -sL https://api.github.com/repos/CleanroomMC/Cleanroom/releases/latest)
          tag=$(echo "$json" | grep '"tag_name"' | cut -d'"' -f4)
          echo "tag=$tag" | tee -a $GITHUB_OUTPUT

      - name: Update mmc-pack.json and rebuild all platform zips
        if: steps.latest.outputs.tag != '' && steps.latest.outputs.tag != steps.current.outputs.version
        run: |
          NEW_VER="${{ steps.latest.outputs.tag }}"
          echo "Updating Cleanroom: ${{ steps.current.outputs.version }} → $NEW_VER"

          # Download new mmc-pack.json
          curl -sL -o /tmp/cleanroom.zip \
            "https://github.com/CleanroomMC/Cleanroom/releases/download/$NEW_VER/Cleanroom-MMC-instance-$NEW_VER.zip"
          unzip -o /tmp/cleanroom.zip mmc-pack.json -d /tmp/
          cp /tmp/mmc-pack.json mmc-pack.json

          # Patch version to Forge's latest to suppress false update notification
          sed -i 's/"cachedVersion": "[^"]*"/"cachedVersion": "14.23.5.2860"/' mmc-pack.json
          sed -i 's/"version": "[^"]*"/"version": "14.23.5.2860"/' mmc-pack.json

          # Update packwiz hash
          HASH=$(sha256sum mmc-pack.json | cut -d' ' -f1)
          sed -i "s/hash = \".*\"/hash = \"$HASH\"/" mmc-pack.json.pw.toml

          # Store new Cleanroom version
          echo "$NEW_VER" > cleanroom-version.txt

          # Rebuild all 3 platform zips
          for os in linux windows macos; do
            echo "=== Building $os zip ==="
            BUILD="/tmp/builds/$os"
            mkdir -p "$BUILD"

            # Clone the repo content (without .git) as base
            cp -r "$GITHUB_WORKSPACE"/* "$BUILD/" 2>/dev/null || true
            cp -r "$GITHUB_WORKSPACE"/.github "$BUILD/" 2>/dev/null || true
            rm -rf "$BUILD/.git"

            # Keep existing JRE in each build
            # (JREs are committed to the repo, already in minecraft/jre25)

            # Create pre-launch scripts
            cat > "$BUILD/minecraft/pre-launch.sh" << 'SCRIPT'
#!/bin/sh
"$INST_JAVA" -jar "$INST_DIR/minecraft/packwiz-installer-bootstrap.jar" --timeout 0 "https://raw.githubusercontent.com/samueltobiasmartinez09/cleanroom-modpack/main/pack.toml"
cp -f "$INST_DIR/minecraft/mmc-pack.json" "$INST_DIR/mmc-pack.json"
SCRIPT
            chmod +x "$BUILD/minecraft/pre-launch.sh"

            if [ "$os" = "windows" ]; then
              cat > "$BUILD/minecraft/pre-launch.bat" << 'SCRIPT'
@"%INST_JAVA%" -jar "%INST_DIR%\minecraft\packwiz-installer-bootstrap.jar" --timeout 0 "https://raw.githubusercontent.com/samueltobiasmartinez09/cleanroom-modpack/main/pack.toml"
@copy /Y "%INST_DIR%\minecraft\mmc-pack.json" "%INST_DIR%\mmc-pack.json"
SCRIPT
            fi

            # Switch scripts
            cat > "$BUILD/minecraft/switch-to-optifine.sh" << 'SCRIPT'
#!/bin/sh
cd "$(dirname "$0")" || exit 1
python3 << 'PYEOF'
import json
with open('packwiz.json', 'r') as f:
    data = json.load(f)
cf = data.get('cachedFiles', {})
for k in ['mods/celeritas-forge.pw.toml','mods/celeritasdynamiclights.pw.toml','mods/celeritasextra.pw.toml','mods/celeritasleafculling.pw.toml']:
    cf.get(k, {})['optionValue'] = False
for k in ['mods/optifine.pw.toml','mods/optinotfine.pw.toml']:
    cf.pop(k, None)
with open('packwiz.json', 'w') as f:
    json.dump(data, f, indent=2)
print('Switched to OptiFine')
PYEOF
SCRIPT
            chmod +x "$BUILD/minecraft/switch-to-optifine.sh"

            cat > "$BUILD/minecraft/switch-to-celeritas.sh" << 'SCRIPT'
#!/bin/sh
cd "$(dirname "$0")" || exit 1
python3 << 'PYEOF'
import json
with open('packwiz.json', 'r') as f:
    data = json.load(f)
cf = data.get('cachedFiles', {})
for k in ['mods/optifine.pw.toml','mods/optinotfine.pw.toml']:
    cf.get(k, {})['optionValue'] = False
for k in ['mods/celeritas-forge.pw.toml','mods/celeritasdynamiclights.pw.toml','mods/celeritasextra.pw.toml','mods/celeritasleafculling.pw.toml']:
    cf.pop(k, None)
with open('packwiz.json', 'w') as f:
    json.dump(data, f, indent=2)
print('Switched to Celeritas')
PYEOF
SCRIPT
            chmod +x "$BUILD/minecraft/switch-to-celeritas.sh"

            if [ "$os" = "windows" ]; then
              cat > "$BUILD/minecraft/switch-to-optifine.bat" << 'SCRIPT'
@echo off
cd /d "%~dp0"
python -c "
import json
with open('packwiz.json', 'r') as f:
    data = json.load(f)
cf = data.get('cachedFiles', {})
for k in ['mods/celeritas-forge.pw.toml','mods/celeritasdynamiclights.pw.toml','mods/celeritasextra.pw.toml','mods/celeritasleafculling.pw.toml']:
    cf.get(k, {})['optionValue'] = False
for k in ['mods/optifine.pw.toml','mods/optinotfine.pw.toml']:
    cf.pop(k, None)
with open('packwiz.json', 'w') as f:
    json.dump(data, f, indent=2)
print('Switched to OptiFine')
"
SCRIPT

              cat > "$BUILD/minecraft/switch-to-celeritas.bat" << 'SCRIPT'
@echo off
cd /d "%~dp0"
python -c "
import json
with open('packwiz.json', 'r') as f:
    data = json.load(f)
cf = data.get('cachedFiles', {})
for k in ['mods/optifine.pw.toml','mods/optinotfine.pw.toml']:
    cf.get(k, {})['optionValue'] = False
for k in ['mods/celeritas-forge.pw.toml','mods/celeritasdynamiclights.pw.toml','mods/celeritasextra.pw.toml','mods/celeritasleafculling.pw.toml']:
    cf.pop(k, None)
with open('packwiz.json', 'w') as f:
    json.dump(data, f, indent=2)
print('Switched to Celeritas')
"
SCRIPT
            fi

            # Update PreLaunchCommand
            CFG="$BUILD/instance.cfg"
            if [ -f "$CFG" ]; then
              if [ "$os" = "windows" ]; then
                sed -i "s|PreLaunchCommand=.*|PreLaunchCommand=cmd.exe /c \$INST_DIR\\\minecraft\\\pre-launch.bat|" "$CFG"
              else
                sed -i "s|PreLaunchCommand=.*|PreLaunchCommand=/bin/sh \$INST_DIR/minecraft/pre-launch.sh|" "$CFG"
              fi
            fi

            ZIPNAME="cleanroom-modpack-v1.0.0-$os.zip"
            (cd "$BUILD" && zip -r9 "/tmp/$ZIPNAME" . -x ".packignore")
            gh release upload v1.0.0 "/tmp/$ZIPNAME" --clobber
          done

          # Commit changes
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add mmc-pack.json mmc-pack.json.pw.toml cleanroom-version.txt
          git commit -m "Update Cleanroom to $NEW_VER (all platforms)"
          git push
