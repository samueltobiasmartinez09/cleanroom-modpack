name: Check Zulu JRE Update

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get current Zulu version
        id: current
        run: |
          version=$(cat minecraft/jre25/release | grep JAVA_RUNTIME_VERSION | cut -d'"' -f2)
          echo "version=$version" | tee -a $GITHUB_OUTPUT

      - name: Fetch latest Zulu JRE 25 info
        id: latest
        run: |
          json=$(curl -sL "https://api.azul.com/metadata/v1/zulu/packages/?java_version=25&os=linux&arch=x86&archive_type=tar.gz&java_package_type=jre&javafx=false&latest=true&page_size=1")
          url=$(echo "$json" | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['download_url'])")
          name=$(echo "$json" | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['name'])")
          echo "url=$url" | tee -a $GITHUB_OUTPUT
          echo "name=$name" | tee -a $GITHUB_OUTPUT

      - name: Download, extract and rebuild instance zip
        if: steps.latest.outputs.url != ''
        run: |
          NEW_URL="${{ steps.latest.outputs.url }}"
          NEW_NAME="${{ steps.latest.outputs.name }}"

          # Extract java version from filename (e.g. zulu25.34.17-ca-crac-jre25.0.3-linux_x64.tar.gz)
          JAVA_VER=$(echo "$NEW_NAME" | grep -oP 'jre\K[\d.]+(?=-linux)')
          echo "Found Zulu JRE: $JAVA_VER from $NEW_URL"

          # Check if version changed
          CURRENT="${{ steps.current.outputs.version }}"
          if [ "$JAVA_VER" = "$CURRENT" ]; then
            echo "No update needed (current: $CURRENT)"
            exit 0
          fi
          echo "Updating: $CURRENT → $JAVA_VER"

          # Remove old JRE
          rm -rf minecraft/jre25

          # Download and extract new JRE
          curl -sL -o /tmp/zulu.tar.gz "$NEW_URL"
          mkdir -p /tmp/zulu-extract
          tar -xzf /tmp/zulu.tar.gz -C /tmp/zulu-extract

          # Find the extracted directory (contains 'zulu' and has bin/java)
          JRE_DIR=$(find /tmp/zulu-extract -maxdepth 2 -name "bin" -type d | head -1)
          JRE_DIR=$(dirname "$JRE_DIR")
          mv "$JRE_DIR" minecraft/jre25

          # Clean up unnecessary files
          rm -f minecraft/jre25/readme.txt minecraft/jre25/Welcome.html minecraft/jre25/DISCLAIMER 2>/dev/null

          # Get the java version for instance.cfg
          JAVA_SHORT=$(minecraft/jre25/bin/java -version 2>&1 | head -1 | grep -oP '\d+\.\d+\.\d+')
          echo "JRE version: $JAVA_SHORT"

          # Update instance.cfg with new version info
          sed -i "s/JavaVersion=.*/JavaVersion=$JAVA_SHORT/" instance.cfg

          # Update release file
          cp minecraft/jre25/release .

          # Rebuild instance zip
          rm -f cleanroom-modpack-v1.0.0.zip
          zip -r cleanroom-modpack-v1.0.0.zip . -x ".packignore"

          # Upload to release
          gh release upload v1.0.0 cleanroom-modpack-v1.0.0.zip --clobber

          # Commit jre25 changes to repo
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add minecraft/jre25/ instance.cfg
          git commit -m "Update Zulu JRE to $JAVA_VER"
          git push

          echo "Zulu JRE updated to $JAVA_VER"
        env:
          GH_TOKEN: ${{ github.token }}
