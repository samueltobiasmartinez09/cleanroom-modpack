name: Check Zulu JRE Update

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get current Zulu version
        id: current
        run: |
          version=$(cat minecraft/jre25/release | grep JAVA_RUNTIME_VERSION | cut -d'"' -f2)
          echo "version=$version" | tee -a $GITHUB_OUTPUT

      - name: Fetch latest Zulu JRE 25 for all platforms
        id: latest
        run: |
          for os in linux windows macos; do
            case "$os" in
              linux)   atype="tar.gz" ;;
              windows) atype="zip" ;;
              macos)   atype="zip" ;;
            esac
            json=$(curl -sL "https://api.azul.com/metadata/v1/zulu/packages/?java_version=25&os=$os&arch=x86&archive_type=$atype&java_package_type=jre&javafx=false&latest=true&page_size=1")
            url=$(echo "$json" | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['download_url'])")
            name=$(echo "$json" | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['name'])")
            echo "${os}_url=$url" | tee -a $GITHUB_OUTPUT
            echo "${os}_name=$name" | tee -a $GITHUB_OUTPUT
          done

      - name: Build platform zips with updated JRE
        if: steps.latest.outputs.linux_url != ''
        run: |
          LINUX_URL="${{ steps.latest.outputs.linux_url }}"
          LINUX_NAME="${{ steps.latest.outputs.linux_name }}"
          WIN_URL="${{ steps.latest.outputs.windows_url }}"
          WIN_NAME="${{ steps.latest.outputs.windows_name }}"
          MAC_URL="${{ steps.latest.outputs.macos_url }}"
          MAC_NAME="${{ steps.latest.outputs.macos_name }}"

          JAVA_VER=$(echo "$LINUX_NAME" | grep -oP 'jre\K[\d.]+(?=-linux)')
          CURRENT="${{ steps.current.outputs.version }}"

          if [ "$JAVA_VER" = "$CURRENT" ]; then
            echo "No update needed (current: $CURRENT)"
            exit 0
          fi
          echo "Updating: $CURRENT → $JAVA_VER"
          JAVA_SHORT=$(echo "$JAVA_VER" | cut -d. -f1-3)

          download_and_extract() {
            local os="$1" url="$2" name="$3" dest="$4"
            echo "--- Processing $os ---"
            mkdir -p "/tmp/builds/$os"
            case "$os" in
              linux)
                curl -sL -o /tmp/zulu_linux.tar.gz "$url"
                mkdir -p /tmp/zulu_extract_linux
                tar -xzf /tmp/zulu_linux.tar.gz -C /tmp/zulu_extract_linux
                JRE_DIR=$(find /tmp/zulu_extract_linux -maxdepth 2 -name "bin" -type d | head -1)
                JRE_DIR=$(dirname "$JRE_DIR")
                mv "$JRE_DIR" "$dest/minecraft/jre25"
                rm -f "$dest/minecraft/jre25/readme.txt" "$dest/minecraft/jre25/Welcome.html" "$dest/minecraft/jre25/DISCLAIMER" 2>/dev/null
                ;;
              windows)
                curl -sL -o /tmp/zulu_win.zip "$url"
                unzip -qo /tmp/zulu_win.zip -d /tmp/zulu_extract_win
                JRE_DIR=$(find /tmp/zulu_extract_win -maxdepth 2 -name "bin" -type d | head -1)
                JRE_DIR=$(dirname "$JRE_DIR")
                mv "$JRE_DIR" "$dest/minecraft/jre25"
                rm -f "$dest/minecraft/jre25/readme.txt" "$dest/minecraft/jre25/Welcome.html" "$dest/minecraft/jre25/DISCLAIMER" 2>/dev/null
                ;;
              macos)
                curl -sL -o /tmp/zulu_mac.zip "$url"
                unzip -qo /tmp/zulu_mac.zip -d /tmp/zulu_extract_mac
                JRE_DIR=$(find /tmp/zulu_extract_mac -maxdepth 4 -name "Home" -type d | head -1)
                mv "$JRE_DIR"/* "$dest/minecraft/jre25/"
                rm -f "$dest/minecraft/jre25/readme.txt" "$dest/minecraft/jre25/Welcome.html" "$dest/minecraft/jre25/DISCLAIMER" 2>/dev/null
                ;;
            esac
          }

          # Build base structure (copy from repo, strip JRE)
          for os in linux windows macos; do
            BUILD="/tmp/builds/$os"
            cp -r "$GITHUB_WORKSPACE"/* "$BUILD/" 2>/dev/null || true
            cp -r "$GITHUB_WORKSPACE"/.github "$BUILD/" 2>/dev/null || true
            rm -rf "$BUILD/minecraft/jre25" "$BUILD/.git" "$BUILD/.github"
            mkdir -p "$BUILD/minecraft"
          done

          # Download and inject each platform's JRE
          download_and_extract linux   "$LINUX_URL" "$LINUX_NAME" "/tmp/builds/linux"
          download_and_extract windows "$WIN_URL"   "$WIN_NAME"   "/tmp/builds/windows"
          download_and_extract macos   "$MAC_URL"   "$MAC_NAME"   "/tmp/builds/macos"

          # Create pre-launch scripts, switch scripts, and update instance.cfg
          for os in linux windows macos; do
            BUILD="/tmp/builds/$os"

            # Pre-launch scripts
            cat > "$BUILD/minecraft/pre-launch.sh" << 'SCRIPT'
#!/bin/sh
"$INST_JAVA" -jar "$INST_DIR/minecraft/packwiz-installer-bootstrap.jar" --timeout 0 "https://raw.githubusercontent.com/samueltobiasmartinez09/cleanroom-modpack/main/pack.toml"
cp -f "$INST_DIR/minecraft/mmc-pack.json" "$INST_DIR/mmc-pack.json"
SCRIPT
            chmod +x "$BUILD/minecraft/pre-launch.sh"

            cat > "$BUILD/minecraft/pre-launch.bat" << 'SCRIPT'
@"%INST_JAVA%" -jar "%INST_DIR%\minecraft\packwiz-installer-bootstrap.jar" --timeout 0 "https://raw.githubusercontent.com/samueltobiasmartinez09/cleanroom-modpack/main/pack.toml"
@copy /Y "%INST_DIR%\minecraft\mmc-pack.json" "%INST_DIR%\mmc-pack.json"
SCRIPT

            # Switch scripts
            RELEASE_URL="https://github.com/samueltobiasmartinez09/cleanroom-modpack/releases/download/v1.0.0"

            cat > "$BUILD/minecraft/switch-to-optifine.sh" << 'SCRIPT'
#!/bin/sh
cd "$(dirname "$0")" || exit 1
RELEASE_URL="https://github.com/samueltobiasmartinez09/cleanroom-modpack/releases/download/v1.0.0"
echo "Downloading OptiFine..."
curl -sL -o "mods/preview_OptiFine_1.12.2_HD_U_G6_pre1.jar" "$RELEASE_URL/preview_OptiFine_1.12.2_HD_U_G6_pre1.jar"
curl -sL -o "mods/OptiNotFine-1.0.jar" "$RELEASE_URL/OptiNotFine-1.0.jar"
echo "Disabling Celeritas..."
for f in celeritas-forge-mc12.2-2.4.0-dev.jar celeritasdynamiclights-1.2.9.jar celeritasextra-0.6.0.jar celeritasleafculling-1.0.0.jar; do
    [ -f "mods/$f" ] && mv "mods/$f" "mods/$f.disabled"
done
echo "Switched to OptiFine"
SCRIPT
            chmod +x "$BUILD/minecraft/switch-to-optifine.sh"

            cat > "$BUILD/minecraft/switch-to-celeritas.sh" << 'SCRIPT'
#!/bin/sh
cd "$(dirname "$0")" || exit 1
echo "Removing OptiFine..."
rm -f "mods/preview_OptiFine_1.12.2_HD_U_G6_pre1.jar" "mods/OptiNotFine-1.0.jar"
echo "Restoring Celeritas..."
for f in celeritas-forge-mc12.2-2.4.0-dev.jar celeritasdynamiclights-1.2.9.jar celeritasextra-0.6.0.jar celeritasleafculling-1.0.0.jar; do
    [ -f "mods/$f.disabled" ] && mv "mods/$f.disabled" "mods/$f"
done
echo "Switched to Celeritas"
SCRIPT
            chmod +x "$BUILD/minecraft/switch-to-celeritas.sh"

            cat > "$BUILD/minecraft/switch-to-optifine.bat" << 'SCRIPT'
@echo off
cd /d "%~dp0"
set RELEASE_URL=https://github.com/samueltobiasmartinez09/cleanroom-modpack/releases/download/v1.0.0
echo Downloading OptiFine...
curl -sL -o "mods\preview_OptiFine_1.12.2_HD_U_G6_pre1.jar" "%RELEASE_URL%/preview_OptiFine_1.12.2_HD_U_G6_pre1.jar"
curl -sL -o "mods\OptiNotFine-1.0.jar" "%RELEASE_URL%/OptiNotFine-1.0.jar"
echo Disabling Celeritas...
for %%f in (celeritas-forge-mc12.2-2.4.0-dev.jar celeritasdynamiclights-1.2.9.jar celeritasextra-0.6.0.jar celeritasleafculling-1.0.0.jar) do (
    if exist "mods\%%f" ren "mods\%%f" "%%f.disabled"
)
echo Switched to OptiFine
SCRIPT

            cat > "$BUILD/minecraft/switch-to-celeritas.bat" << 'SCRIPT'
@echo off
cd /d "%~dp0"
echo Removing OptiFine...
del /Q "mods\preview_OptiFine_1.12.2_HD_U_G6_pre1.jar" "mods\OptiNotFine-1.0.jar" 2>nul
echo Restoring Celeritas...
for %%f in (celeritas-forge-mc12.2-2.4.0-dev.jar celeritasdynamiclights-1.2.9.jar celeritasextra-0.6.0.jar celeritasleafculling-1.0.0.jar) do (
    if exist "mods\%%f.disabled" ren "mods\%%f.disabled" "%%f"
)
echo Switched to Celeritas
SCRIPT

            CFG="$BUILD/instance.cfg"
            if [ -f "$CFG" ]; then
              sed -i "s/JavaVersion=.*/JavaVersion=$JAVA_SHORT/" "$CFG"
              if [ "$os" = "windows" ]; then
                sed -i "s|PreLaunchCommand=.*|PreLaunchCommand=cmd.exe /c \$INST_DIR\\\minecraft\\\pre-launch.bat|" "$CFG"
              else
                sed -i "s|PreLaunchCommand=.*|PreLaunchCommand=/bin/sh \$INST_DIR/minecraft/pre-launch.sh|" "$CFG"
              fi
            fi

            ZIPNAME="cleanroom-modpack-v1.0.0-$os.zip"
            echo "Building $ZIPNAME ..."
            (cd "$BUILD" && zip -r9 "/tmp/$ZIPNAME" . -x ".packignore")
          done

          # Upload all 3 zips
          for os in linux windows macos; do
            ZIPNAME="cleanroom-modpack-v1.0.0-$os.zip"
            gh release upload v1.0.0 "/tmp/$ZIPNAME" --clobber
          done

          # Update Linux JRE in repo (for version tracking)
          rm -rf minecraft/jre25
          cp -r /tmp/builds/linux/minecraft/jre25 minecraft/jre25
          cp minecraft/jre25/release .
          sed -i "s/JavaVersion=.*/JavaVersion=$JAVA_SHORT/" instance.cfg

          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add minecraft/jre25/ instance.cfg
          git commit -m "Update Zulu JRE to $JAVA_SHORT (all platforms)"
          git push

          echo "Zulu JRE updated to $JAVA_SHORT (linux, windows, macos)"
        env:
          GH_TOKEN: ${{ github.token }}
