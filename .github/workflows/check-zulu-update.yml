name: Check Zulu JRE Update

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get current Zulu version
        id: current
        run: |
          version=$(cat minecraft/jre25/release | grep JAVA_RUNTIME_VERSION | cut -d'"' -f2)
          echo "version=$version" | tee -a $GITHUB_OUTPUT

      - name: Fetch latest Zulu JRE 25 for all platforms
        id: latest
        run: |
          for os in linux windows macos; do
            case "$os" in
              linux)   atype="tar.gz" ;;
              windows) atype="zip" ;;
              macos)   atype="zip" ;;
            esac
            json=$(curl -sL "https://api.azul.com/metadata/v1/zulu/packages/?java_version=25&os=$os&arch=x86&archive_type=$atype&java_package_type=jre&javafx=false&latest=true&page_size=1")
            url=$(echo "$json" | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['download_url'])")
            name=$(echo "$json" | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['name'])")
            echo "${os}_url=$url" | tee -a $GITHUB_OUTPUT
            echo "${os}_name=$name" | tee -a $GITHUB_OUTPUT
          done

      - name: Update JREs in repo (no zip builds)
        if: steps.latest.outputs.linux_url != ''
        run: |
          LINUX_URL="${{ steps.latest.outputs.linux_url }}"
          LINUX_NAME="${{ steps.latest.outputs.linux_name }}"
          WIN_URL="${{ steps.latest.outputs.windows_url }}"
          WIN_NAME="${{ steps.latest.outputs.windows_name }}"
          MAC_URL="${{ steps.latest.outputs.macos_url }}"
          MAC_NAME="${{ steps.latest.outputs.macos_name }}"

          JAVA_VER=$(echo "$LINUX_NAME" | grep -oP 'jre\K[\d.]+(?=-linux)')
          CURRENT="${{ steps.current.outputs.version }}"

          if [ "$JAVA_VER" = "$CURRENT" ]; then
            echo "No update needed (current: $CURRENT)"
            exit 0
          fi
          echo "Updating: $CURRENT → $JAVA_VER"
          JAVA_SHORT=$(echo "$JAVA_VER" | cut -d. -f1-3)

          download_and_extract() {
            local os="$1" url="$2" dest="$3"
            echo "--- Processing $os ---"
            mkdir -p "$dest"
            case "$os" in
              linux)
                curl -sL -o /tmp/zulu_linux.tar.gz "$url"
                mkdir -p /tmp/zulu_extract_linux
                tar -xzf /tmp/zulu_linux.tar.gz -C /tmp/zulu_extract_linux
                JRE_DIR=$(find /tmp/zulu_extract_linux -maxdepth 2 -name "bin" -type d | head -1)
                JRE_DIR=$(dirname "$JRE_DIR")
                rm -rf "$dest"/*
                cp -r "$JRE_DIR"/* "$dest/"
                rm -f "$dest/readme.txt" "$dest/Welcome.html" "$dest/DISCLAIMER" 2>/dev/null
                ;;
              windows)
                curl -sL -o /tmp/zulu_win.zip "$url"
                mkdir -p /tmp/zulu_extract_win
                unzip -qo /tmp/zulu_win.zip -d /tmp/zulu_extract_win
                JRE_DIR=$(find /tmp/zulu_extract_win -maxdepth 2 -name "bin" -type d | head -1)
                JRE_DIR=$(dirname "$JRE_DIR")
                rm -rf "$dest"/*
                cp -r "$JRE_DIR"/* "$dest/"
                rm -f "$dest/readme.txt" "$dest/Welcome.html" "$dest/DISCLAIMER" 2>/dev/null
                ;;
              macos)
                curl -sL -o /tmp/zulu_mac.zip "$url"
                mkdir -p /tmp/zulu_extract_mac
                unzip -qo /tmp/zulu_mac.zip -d /tmp/zulu_extract_mac
                JRE_DIR=$(find /tmp/zulu_extract_mac -maxdepth 4 -name "Home" -type d | head -1)
                rm -rf "$dest"/*
                cp -r "$JRE_DIR"/* "$dest/"
                rm -f "$dest/readme.txt" "$dest/Welcome.html" "$dest/DISCLAIMER" 2>/dev/null
                ;;
            esac
            echo "$os JRE extracted to $dest"
          }

          # Extract each JRE directly to its repo directory
          download_and_extract linux   "$LINUX_URL" "$GITHUB_WORKSPACE/minecraft/jre25"
          download_and_extract windows "$WIN_URL"   "$GITHUB_WORKSPACE/minecraft/jre25-win"
          download_and_extract macos   "$MAC_URL"   "$GITHUB_WORKSPACE/minecraft/jre25-mac"

          # Update JavaVersion in instance.cfg
          sed -i "s/JavaVersion=.*/JavaVersion=$JAVA_SHORT/" instance.cfg

          # Commit changes (no zip builds — JREs go straight to repo)
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add minecraft/jre25/ minecraft/jre25-win/ minecraft/jre25-mac/ instance.cfg
          git commit -m "Update Zulu JRE to $JAVA_SHORT (linux, windows, macos)"
          git push

          echo "Zulu JRE updated to $JAVA_SHORT (all 3 platforms committed to repo)"
